<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gusto & Fantasia - Ricette Facili</title>

    <style>
        h1,
        h2 {
            margin: 10px;
            padding: 10px;
            color: rgb(25, 255, 159);
            background-color: aquamarine;
            text-align: center;
        }

        section {
            padding: 15px;
        }

        div {
            padding: 15px;
            width: 250px;
            height: 250px;
            margin: auto;
            margin-bottom: 15px;
            border-radius: 12px;
            box-shadow: 0px 4px 8px gray;
            background-color: #ccc;
        }

        div img {
            display: block;
            border-radius: 50%;
            margin: auto;
            box-shadow: 0px 4px 8px gray;
        }

        button {
            display: block;
            width: 50%;
            margin: auto;
            border: none;
            padding: 10px 0;
            border-radius: 8px;
            box-shadow: 0px 4px 8px gray;
            cursor: pointer;
        }

        button:hover {
            background-color: green;
            color: white;
            font-weight: 700;
            box-shadow: none;
        }

        div:hover {
            background-color: #f3f3f3;
            box-shadow: none;
        }
    </style>


</head>



<body>

    <header>
        <h1>Gusto & Fantasia</h1>
        <h2>I piatti più amati della settiman</h2>
    </header>

    <section>
        <article>
            <div>
                <img src="images/spaghetticarbonara.jpg" alt="Imagine Spaghetti" width="80px">
                <h3>Spaghetti Carbonara</h3>
                <p>Il classico romano pronto in 15 minuti.</p>
                <button type="button">Cucina</button>
            </div>
            <div>
                <img src="images/tiramisu.jpg" alt="Imagine Tiramisu" width="80px" height="80px">
                <h3>Tiramisù Classico</h3>
                <p>Il dessert al caffè senza cottura.</p>
                <button type="button">Cucina</button>
            </div>
        </article>
    </section>

</body>

</html>
