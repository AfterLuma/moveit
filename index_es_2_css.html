<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Shop - Piante da Interno</title>
    <style>
        h1,
        h2 {
            margin: 10px;
            padding: 10px;
            color: green;
            background-color: aquamarine;
            text-align: center;
        }

        section {
            padding: 15px;
        }

        div {
            padding: 15px;
            width: 250px;
            height: 250px;
            border-radius: 12px;
            background-color: gray;
            box-shadow: 0px 8px 4px gray;
            margin: auto;
            margin-bottom: 15px;
        }

        div img {
            display: block;
            border-radius: 50%;
            box-shadow: 0px 8px 4px gray;
            margin: auto;

        }

        button {
            display: block;
            width: 50%;
            margin: auto;
            border: none;
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0px 8px 4px gray;
            cursor: pointer;
        }

        button:hover {
            background-color: green;
            color: white;
            font-weight: 700;
            box-shadow: none;
        }

        div:hover {
            background-color: rgb(232, 223, 223);
            box-shadow: none;
        }
    </style>



</head>

<body>

    <header>
        <h1>Green Shop</h1>
        <h2>Scegli la tua pianta preferita</h2>
    </header>

    <section>
        <article>
            <div>
                <img src="images/monstera.webp" alt="Monstera" width="80px">
                <h3>Monstera Deliciosa</h3>
                <p>Pianta tropicale facile da curare.</p>
                <button>Acquista</button>
            </div>
            <div>
                <img src="images/ficus.webp" alt="Ficus" width="80px" height="80px">
                <h3>Ficus Lyrata</h3>
                <p>Perfetta per dare vita al soggiorno.</p>
                <button>Acquista</button>
            </div>

        </article>
    </section>

</body>

</html>
